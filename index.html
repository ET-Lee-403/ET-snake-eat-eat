<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>氙基原點：三部曲 - 精英三強版</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAas6Yjbxiz5Zi4oS2iVBfR623RRkBtUtQ",
            authDomain: "xenobase-game.firebaseapp.com",
            databaseURL: "https://xenobase-game-default-rtdb.firebaseio.com",
            projectId: "xenobase-game",
            storageBucket: "xenobase-game.firebasestorage.app",
            messagingSenderId: "604471818309",
            appId: "1:604471818309:web:c1903c285023af803f8b2c",
            measurementId: "G-VXB3Z97JX0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const scoresRef = ref(db, 'leaderboard');

        window.saveScoreToCloud = async (name, score) => {
            try {
                const newScoreRef = push(scoresRef);
                await set(newScoreRef, { name, score, timestamp: Date.now() });
            } catch (e) { console.error("同步失敗", e); }
        };

        // 修改此處：僅抓取最後 3 筆最高分
        const topScoresQuery = query(scoresRef, orderByChild("score"), limitToLast(3));
        onValue(topScoresQuery, (snapshot) => {
            const list = document.getElementById("leader-list");
            if (!list) return;
            list.innerHTML = "";
            const results = [];
            snapshot.forEach((child) => { results.push(child.val()); });
            
            const badges = ["🥇", "🥈", "🥉"];
            results.reverse().forEach((d, index) => {
                list.innerHTML += `<div class="leader-item">
                    <span>${badges[index] || ''} ${d.name}</span>
                    <span style="color:var(--accent)">${d.score} PT</span>
                </div>`;
            });
        });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@300;700;900&display=swap');
        
        :root {
            --neon: #00ff9d;
            --accent: #ffaa00;
            --bg: #050508;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--neon); font-family: 'Noto Sans TC', sans-serif; touch-action: none; }
        
        body::before {
            content: " ";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
            background-size: 100% 3px, 3px 100%;
            z-index: 150; pointer-events: none;
        }

        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100; background: radial-gradient(circle, rgba(10,10,25,0.8) 0%, rgba(2,2,5,0.98) 100%);
            backdrop-filter: blur(25px); transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        h1 { 
            font-size: clamp(38px, 9vw, 60px); margin: 0; 
            font-weight: 900;
            background: linear-gradient(to bottom, #fff 20%, var(--neon) 80%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 255, 157, 0.6));
            letter-spacing: 4px; text-align: center;
        }

        .sub-title { 
            color: var(--accent); font-size: 14px; margin-top: 5px; margin-bottom: 35px; 
            letter-spacing: 8px; font-family: 'Orbitron'; opacity: 0.9;
        }
        
        .main-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 157, 0.15);
            padding: 35px; border-radius: 24px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center;
        }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 260px; }
        
        button { 
            padding: 14px; font-size: 17px; font-weight: 700; background: transparent; 
            color: var(--neon); border: 1px solid var(--neon); cursor: pointer; 
            font-family: 'Noto Sans TC'; transition: 0.3s; position: relative;
            letter-spacing: 2px; border-radius: 8px;
        }

        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 25px var(--neon); transform: translateY(-2px); }

        .skin-selector { display: flex; gap: 12px; margin-bottom: 25px; }
        .skin-card { 
            border: 1px solid #333; padding: 10px; cursor: pointer; 
            border-radius: 10px; width: 65px; text-align: center; 
            font-size: 13px; font-weight: 700; transition: 0.3s;
            background: rgba(0,0,0,0.4); color: #666;
        }
        .skin-card.active { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); transform: scale(1.1); color: #fff; }

        .help-btn { 
            position: absolute; top: 25px; right: 25px; width: 42px; height: 42px; 
            background: transparent; border: 1px solid var(--neon); color: var(--neon); 
            border-radius: 50%; font-size: 20px; cursor: pointer; z-index: 110;
        }

        #leaderboard-ui { margin-top: 25px; width: 100%; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .leader-item { display: flex; justify-content: space-between; margin: 10px 0; font-size: 14px; color: #eee; width: 220px; }
        
        #ui-layer { position: absolute; top: 25px; left: 25px; pointer-events: none; z-index: 10; display: none; }
        #progress-bar-container { width: 180px; height: 4px; background: rgba(255,255,255,0.05); margin-top: 8px; border-radius: 2px; }
        #progress-bar { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: 0.3s; }

        .hidden { transform: scale(1.1); opacity: 0; pointer-events: none; }
        input { background: #000; color: #fff; border: 1px solid var(--neon); padding: 12px; text-align: center; width: 80%; margin-bottom: 20px; font-size: 16px; outline: none; }
    </style>
</head>
<body>

<button class="help-btn" id="main-help-btn" onclick="toggleHelp(true)">?</button>

<div id="help-overlay" class="overlay" style="display:none;">
    <h2 style="color: var(--accent); font-family: 'Noto Sans TC'; letter-spacing: 3px;">系統操作手冊</h2>
    <div style="max-width: 320px; text-align: left; line-height: 2.2; color: #ddd; font-weight: 300;">
        <p>🛸 <b>控制：</b>方向鍵 或 螢幕滑動轉向</p>
        <p>🔋 <b>目標：</b>收集綠色球(+1)或金色球(+5)</p>
        <p>🚫 <b>避開：</b>撞擊紅色脈衝星或敵對飛行物</p>
    </div>
    <button onclick="toggleHelp(false)" style="margin-top: 35px; width: 140px;">返回選單</button>
</div>

<div id="game-overlay" class="overlay">
    <h1>氙基原點</h1>
    <p class="sub-title">XENOBASE ORIGIN</p>
    
    <div class="main-card">
        <div class="skin-selector">
            <div class="skin-card active" onclick="selectSkin(0, this)">翡翠</div>
            <div class="skin-card" onclick="selectSkin(1, this)">紫晶</div>
            <div class="skin-card" onclick="selectSkin(2, this)">赤紅</div>
        </div>

        <div class="btn-group">
            <button onclick="startGame('LEVEL')">開始任務模式</button>
            <button onclick="startGame('INFINITE')">無限挑戰模式</button>
        </div>

        <div id="leaderboard-ui">
            <div style="text-align:center; color: #666; font-size: 11px; letter-spacing: 2px; margin-bottom: 10px;">🏆 全球三強演化數據</div>
            <div id="leader-list">載入排名中...</div>
        </div>
    </div>
</div>

<div id="retry-overlay" class="overlay" style="display:none; background: rgba(25,0,0,0.92);">
    <h2 style="color: #ff3366; font-size: 36px;">系統核心崩潰</h2>
    <p id="retry-msg" style="color: #fff; margin-bottom: 35px; letter-spacing: 1px;"></p>
    <div class="btn-group">
        <button onclick="retryCurrentLevel()" style="border-color: var(--accent); color: var(--accent);">重新啟動</button>
        <button onclick="location.reload()">放棄任務</button>
    </div>
</div>

<div id="name-input-ui" style="display:none;" class="overlay">
    <div class="main-card">
        <h2 style="color:var(--accent)">紀錄演化數據</h2>
        <input type="text" id="player-name" maxlength="10" placeholder="請輸入駕駛代號">
        <button onclick="saveScore()">上傳至雲端</button>
    </div>
</div>

<div id="ui-layer">
    <div id="level-display" style="color:var(--accent); font-size: 12px; font-weight: 700; letter-spacing:1px;"></div>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    <p id="score-text" style="font-size: 32px; font-family:'Orbitron'; margin: 8px 0 0 0;">000</p>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("game-overlay");
    const helpOverlay = document.getElementById("help-overlay");
    const mainHelpBtn = document.getElementById("main-help-btn");
    const retryOverlay = document.getElementById("retry-overlay");
    const uiLayer = document.getElementById("ui-layer");
    const progressBar = document.getElementById("progress-bar");
    const scoreText = document.getElementById("score-text");
    const levelDisplay = document.getElementById("level-display");

    let gameMode = 'LEVEL', currentLevelIdx = 0, score = 0, dx = 0, dy = 0, snake = [], foods = [], obstacles = [], enemies = [];
    let isPlaying = false, frameCount = 0;
    let skinConfig = { main: "#00ff9d", glow: "rgba(0, 255, 157, 0.4)" };
    
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let bgmOsc = null;

    function playBGM() {
        if(bgmOsc) stopBGM();
        let i = 0;
        const sequence = [110, 123, 110, 98]; 
        bgmOsc = setInterval(() => {
            if(!isPlaying) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(sequence[i % 4], audioCtx.currentTime);
            g.gain.setValueAtTime(0.012, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1.2);
            i++;
        }, 1000);
    }
    function stopBGM() { clearInterval(bgmOsc); bgmOsc = null; }

    function playSfx(freq, type, duration, vol = 0.08) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const levels = [
        { id: 1, name: "初始紀元", target: 10, speed: 100, obs: 6, bigProb: 0.2, foods: 15 },
        { id: 2, name: "能量風暴", target: 20, speed: 85, obs: 12, bigProb: 0.4, foods: 20 },
        { id: 3, name: "極限奇點", target: 35, speed: 70, obs: 10, bigProb: 0.7, foods: 25 } 
    ];

    function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', res); res();

    function toggleHelp(show) {
        playSfx(show ? 600 : 300, 'sine', 0.1);
        helpOverlay.style.display = show ? "flex" : "none";
        overlay.style.visibility = show ? "hidden" : "visible";
    }

    function selectSkin(idx, el) {
        playSfx(800, 'sine', 0.05);
        document.querySelectorAll('.skin-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        const configs = [
            { main: "#00ff9d", glow: "rgba(0, 255, 157, 0.4)" },
            { main: "#cc00ff", glow: "rgba(204, 0, 255, 0.4)" },
            { main: "#ff3366", glow: "rgba(255, 51, 102, 0.4)" }
        ];
        skinConfig = configs[idx];
        document.documentElement.style.setProperty('--neon', skinConfig.main);
    }

    function startGame(mode) {
        playSfx(440, 'sine', 0.2);
        gameMode = mode;
        overlay.classList.add('hidden');
        uiLayer.style.display = "block";
        mainHelpBtn.style.display = "none";
        currentLevelIdx = 0; isPlaying = true;
        playBGM();
        initGame(); gameLoop();
    }

    function initGame() {
        const tx = Math.floor(canvas.width/30), ty = Math.floor(canvas.height/30);
        snake = [{x: Math.floor(tx/2), y: Math.floor(ty/2)}];
        score = 0; dx = 0; dy = 0; obstacles = []; enemies = [];
        let foodCount = 18;
        
        if (gameMode === 'LEVEL') {
            const lv = levels[currentLevelIdx];
            foodCount = lv.foods;
            for(let i=0; i<lv.obs; i++) spawnObstacle();
            if(lv.id >= 2) spawnEnemies(lv.id === 2 ? 4 : 6);
        } else {
            for(let i=0; i<12; i++) spawnObstacle();
            spawnEnemies(4);
        }
        foods = [];
        for(let i=0; i<foodCount; i++) foods.push(spawnFood());
        updateUI();
    }

    function spawnObstacle() {
        const tx = Math.floor(canvas.width/30), ty = Math.floor(canvas.height/30);
        let ox, oy, isOverlapping, attempts = 0;
        do {
            isOverlapping = false;
            ox = Math.floor(Math.random() * (tx - 4) + 2);
            oy = Math.floor(Math.random() * (ty - 4) + 2);
            if (Math.abs(ox - snake[0].x) < 4 && Math.abs(oy - snake[0].y) < 4) isOverlapping = true;
            if (!isOverlapping) {
                for (let ob of obstacles) {
                    if (Math.sqrt((ox - ob.x)**2 + (oy - ob.y)**2) < 4) { isOverlapping = true; break; }
                }
            }
            attempts++;
        } while (isOverlapping && attempts < 60);
        if (!isOverlapping) obstacles.push({ x: ox, y: oy, size: Math.random()*1 + 1.2, hue: Math.random()*360 });
    }

    function spawnFood() {
        const tx = Math.floor(canvas.width/30), ty = Math.floor(canvas.height/30);
        let fx, fy, isBad, attempts = 0;
        do {
            isBad = false;
            fx = Math.floor(Math.random() * tx);
            fy = Math.floor(Math.random() * ty);
            for (let ob of obstacles) {
                if (Math.sqrt((fx - ob.x)**2 + (fy - ob.y)**2) < ob.size + 1.2) { isBad = true; break; }
            }
            attempts++;
        } while (isBad && attempts < 40);
        const prob = gameMode === 'LEVEL' ? levels[currentLevelIdx].bigProb : 0.4;
        return { x: fx, y: fy, type: Math.random() < prob ? 'BIG' : 'SMALL', hue: Math.random()*360 };
    }

    function spawnEnemies(count) {
        const tx = Math.floor(canvas.width/30), ty = Math.floor(canvas.height/30);
        for(let i=0; i<count; i++) enemies.push({ x: Math.floor(Math.random()*tx), y: Math.floor(Math.random()*ty) });
    }

    function gameLoop() {
        if (!isPlaying) return;
        if (checkHit()) { 
            playSfx(80, 'sawtooth', 0.6, 0.15); 
            isPlaying = false; stopBGM(); handleGameOver(); return; 
        }
        if (gameMode === 'LEVEL' && score >= levels[currentLevelIdx].target) {
            playSfx(1000, 'sine', 0.3);
            if (currentLevelIdx < 2) { currentLevelIdx++; initGame(); } 
            else { isPlaying = false; stopBGM(); alert("任務達成：您已完成最終進化！"); location.reload(); return; }
        }
        setTimeout(() => { frameCount++; draw(); moveSnake(); if(gameMode==='INFINITE'||currentLevelIdx===2) moveEnemies(); gameLoop(); }, gameMode === 'LEVEL' ? levels[currentLevelIdx].speed : 85);
    }

    function moveSnake() {
        let nx = snake[0].x+dx, ny = snake[0].y+dy;
        const tx = Math.floor(canvas.width/30), ty = Math.floor(canvas.height/30);
        if (nx<0) nx=tx-1; if (nx>=tx) nx=0; if (ny<0) ny=ty-1; if (ny>=ty) ny=0;
        
        snake.unshift({x: nx, y: ny});
        
        let fi = foods.findIndex(f => f.x===nx && f.y===ny);
        if (fi !== -1) { 
            const isBig = foods[fi].type === 'BIG';
            if(isBig) {
                playSfx(300, 'sine', 0.2, 0.12);
            } else {
                playSfx(800, 'sine', 0.08, 0.08);
            }
            score += (isBig ? 5 : 1); 
            updateUI(); 
            foods[fi] = spawnFood(); 
        } else if (snake.length > 3) {
            snake.pop();
        }
    }

    function moveEnemies() {
        if (frameCount % 7 !== 0) return;
        const head = snake[0];
        enemies.forEach(en => { if (Math.random() < 0.25) { if (en.x < head.x) en.x++; else if (en.x > head.x) en.x--; if (en.y < head.y) en.y++; else if (en.y > head.y) en.y--; } });
    }

    function checkHit() {
        if(dx===0 && dy===0) return false;
        const h = snake[0];
        const hitObs = obstacles.some(o => Math.sqrt((o.x+0.5-h.x-0.5)**2 + (o.y+0.5-h.y-0.5)**2) < o.size * 0.7);
        const hitEn = enemies.some(e => e.x === h.x && e.y === h.y);
        const hitSelf = snake.slice(4).some(p => p.x===h.x && p.y===h.y);
        return hitObs || hitEn || hitSelf;
    }

    function handleGameOver() {
        if (gameMode === 'INFINITE') { document.getElementById("name-input-ui").style.display = "flex"; } 
        else { document.getElementById("retry-msg").innerText = `任務在「${levels[currentLevelIdx].name}」終止`; retryOverlay.style.display = "flex"; }
    }

    async function saveScore() {
        const name = document.getElementById("player-name").value || "未知生物";
        await window.saveScoreToCloud(name, score);
        location.reload();
    }

    function updateUI() {
        scoreText.innerText = score.toString().padStart(3, '0');
        if (gameMode === 'LEVEL') {
            const lv = levels[currentLevelIdx];
            levelDisplay.innerText = `當前相位：${lv.name}`;
            progressBar.style.width = (score / lv.target * 100) + "%";
        } else {
            levelDisplay.innerText = `模式：無限挑戰`;
            progressBar.style.width = "100%";
        }
    }

    function draw() {
        ctx.fillStyle = "#050508"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(0, 255, 157, 0.04)";
        ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=30) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=30) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

        obstacles.forEach(o => {
            const px = o.x*30+15, py = o.y*30+15, r = 30*o.size;
            ctx.save();
            let g = ctx.createRadialGradient(px-r*0.2, py-r*0.2, r*0.1, px, py, r);
            g.addColorStop(0, '#fff'); g.addColorStop(0.2, `hsl(${o.hue},80%,50%)`); g.addColorStop(1, '#000');
            ctx.shadowBlur = 20; ctx.shadowColor = `hsl(${o.hue},100%,50%)`;
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill(); ctx.restore();
        });

        enemies.forEach(en => {
            const px = en.x*30+15, py = en.y*30+15;
            ctx.shadowBlur = 15; ctx.shadowColor = "#f00";
            ctx.fillStyle = "#ff0044"; 
            ctx.beginPath(); ctx.moveTo(px, py-10); ctx.lineTo(px+10, py+10); ctx.lineTo(px-10, py+10); ctx.closePath(); ctx.fill();
        });

        foods.forEach(f => {
            const px = f.x*30+15, py = f.y*30+15;
            const color = f.type === 'BIG' ? "#ffaa00" : skinConfig.main;
            ctx.shadowBlur = 15; ctx.shadowColor = color;
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(px, py, f.type === 'BIG' ? 8 : 4, 0, Math.PI*2); ctx.fill();
        });

        snake.forEach((p, i) => {
            ctx.fillStyle = i===0 ? "#fff" : skinConfig.main;
            ctx.shadowBlur = i===0 ? 20 : 0; ctx.shadowColor = skinConfig.main;
            ctx.beginPath(); ctx.roundRect(p.x*30+3, p.y*30+3, 24, 24, 5); ctx.fill();
        });
    }

    function retryCurrentLevel() { retryOverlay.style.display="none"; isPlaying=true; playBGM(); initGame(); gameLoop(); }

    window.addEventListener("keydown", e => {
        const k = { 37: [-1,0], 38: [0,-1], 39: [1,0], 40: [0,1] };
        if (k[e.keyCode]) {
            const [nx, ny] = k[e.keyCode];
            if (nx!==-dx || ny!==-dy || snake.length===1) { dx=nx; dy=ny; }
        }
    });

    let tsX = 0, tsY = 0;
    document.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
    document.addEventListener('touchend', e => {
        let dx_r = e.changedTouches[0].clientX - tsX, dy_r = e.changedTouches[0].clientY - tsY;
        if (Math.abs(dx_r) > 20 || Math.abs(dy_r) > 20) {
            if (Math.abs(dx_r) > Math.abs(dy_r)) { if ((dx_r > 0 ? 1 : -1) !== -dx) { dx = dx_r > 0 ? 1 : -1; dy = 0; } }
            else { if ((dy_r > 0 ? 1 : -1) !== -dy) { dx = 0; dy = dy_r > 0 ? 1 : -1; } }
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>氙基原點：三部曲 - 終極主宰版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@500;900&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #010103; color: #00ff9d; font-family: 'Noto Sans TC', sans-serif; touch-action: none; }
        
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100; transition: opacity 1.2s ease-in-out;
            background: rgba(1, 1, 3, 0.4); backdrop-filter: blur(12px);
        }

        h1 { font-size: clamp(45px, 9vw, 65px); margin-bottom: 5px; text-shadow: 0 0 35px #00ff9d; letter-spacing: 12px; text-align: center; font-family: 'Orbitron', sans-serif; }
        .level-info { color: #ffaa00; font-size: 20px; margin-bottom: 35px; text-align: center; letter-spacing: 1px; min-height: 1.5em; }
        .skin-selector { display: flex; gap: 15px; margin-bottom: 40px; }
        
        .skin-card { 
            border: 2px solid #333; padding: 12px; text-align: center; cursor: pointer; 
            background: rgba(255,255,255,0.05); border-radius: 12px; width: 85px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .skin-card.active { border-color: #00ff9d; background: rgba(0, 255, 157, 0.25); transform: scale(1.1) translateY(-5px); box-shadow: 0 10px 20px rgba(0,255,157,0.2); }
        
        button { 
            padding: 16px 55px; font-size: 22px; font-weight: 900; background: transparent; 
            color: #00ff9d; border: 2px solid #00ff9d; cursor: pointer; letter-spacing: 6px; 
            font-family: 'Noto Sans TC'; text-transform: uppercase; transition: 0.4s;
        }
        button:hover { background: #00ff9d; color: #000; box-shadow: 0 0 35px #00ff9d; }

        #ui-layer { position: absolute; top: 30px; left: 30px; pointer-events: none; z-index: 10; display: none; }
        #progress-bar-container { width: 220px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; margin-top: 10px; border: 1px solid rgba(0,255,157,0.3); }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00ff9d, #00f2ff); transition: width 0.3s; }
        canvas { display: block; }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-overlay" class="overlay">
    <h1 id="main-title">氙基原點</h1>
    <div id="level-desc" class="level-info">吞噬、進化、主宰。史詩三部曲</div>
    <div id="skin-area" class="skin-selector">
        <div class="skin-card active" onclick="selectSkin(0, this)">翡翠</div>
        <div class="skin-card" onclick="selectSkin(1, this)">虛空</div>
        <div class="skin-card" onclick="selectSkin(2, this)">湮滅</div>
    </div>
    <button id="action-btn" onclick="handleAction()">啟動演化</button>
</div>

<div id="ui-layer">
    <div id="level-display" style="color:#ffaa00; font-weight:bold; letter-spacing:1px; font-size: 14px;">載入中...</div>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    <p id="score-text" style="font-size: 32px; font-weight: 900; margin: 10px 0 0 0;">能量: 0</p>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("game-overlay");
    const uiLayer = document.getElementById("ui-layer");
    const progressBar = document.getElementById("progress-bar");
    const scoreText = document.getElementById("score-text");
    const levelDisplay = document.getElementById("level-display");
    const actionBtn = document.getElementById("action-btn");
    const levelDesc = document.getElementById("level-desc");

    // --- 觸控邏輯 (新增) ---
    let touchStartX = 0, touchStartY = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, {passive: false});
    document.addEventListener('touchend', e => {
        let dx_raw = e.changedTouches[0].clientX - touchStartX, dy_raw = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx_raw) > 30 || Math.abs(dy_raw) > 30) {
            if (Math.abs(dx_raw) > Math.abs(dy_raw)) {
                let nDx = dx_raw > 0 ? 1 : -1;
                if (nDx !== -dx || snake.length === 1) { dx = nDx; dy = 0; }
            } else {
                let nDy = dy_raw > 0 ? 1 : -1;
                if (nDy !== -dy || snake.length === 1) { dx = 0; dy = nDy; }
            }
        }
    }, {passive: false});

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(f, t, d, v=0.08) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime); o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    const levels = [
        { id: 1, name: "星系覺醒", target: 10, speed: 100, obs: 3, bigProb: 0.2 },
        { id: 2, name: "能量風暴", target: 20, speed: 85, obs: 5, bigProb: 0.4 },
        { id: 3, name: "終極演化", target: 25, speed: 75, obs: 8, bigProb: 0.7 } 
    ];

    let currentLevelIdx = 0, score = 0, dx = 0, dy = 0, snake = [], foods = [], obstacles = [];
    let isPlaying = false, frameCount = 0, skinConfig = { main: "#00ff9d", glow: "rgba(0, 255, 157, 0.4)" };
    let transitionActive = false, transitionFrame = 0, isEnding = false;
    
    function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', res); res();

    function drawMenuBackground() {
        if(isPlaying && !transitionActive) return;
        ctx.fillStyle = "#010103"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const centerX = canvas.width/2, centerY = canvas.height/2;
        const radius = Math.max(canvas.width, canvas.height);
        let grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
        grad.addColorStop(0, isEnding ? skinConfig.glow : `hsla(260, 80%, 15%, 0.6)`);
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

        const obsX = canvas.width * 0.85, obsY = canvas.height * 0.8;
        const obsR = canvas.width * (isEnding ? 0.4 : 0.25);
        let g = ctx.createRadialGradient(obsX-obsR*0.2, obsY-obsR*0.2, obsR*0.1, obsX, obsY, obsR);
        g.addColorStop(0, '#fff'); g.addColorStop(0.3, skinConfig.main); g.addColorStop(1, '#000');
        ctx.save(); ctx.shadowBlur = isEnding ? 150 : 100; ctx.shadowColor = skinConfig.glow;
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(obsX, obsY, obsR, 0, Math.PI*2); ctx.fill(); ctx.restore();
        
        ctx.save(); ctx.translate(centerX, centerY);
        const pCount = isEnding ? 200 : 120;
        for(let i=0; i<pCount; i++) {
            const angle = (i * 137.5) * Math.PI / 180;
            let speedMult = transitionActive ? (transitionFrame * 0.8) + 1 : 1;
            let dist = ((i * 12 + frameCount * (isEnding ? 5 : 2)) % 1200) * speedMult;
            const x = Math.cos(angle) * dist, y = Math.sin(angle) * dist;
            ctx.fillStyle = (transitionActive || isEnding) ? skinConfig.main : `rgba(255, 255, 255, 0.3)`;
            const size = (transitionActive || isEnding) ? 15 : 2;
            ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
        
        if (transitionActive) {
            transitionFrame++;
            if (transitionFrame > 60) { transitionActive = false; transitionFrame = 0; if (!isEnding) actualStartGame(); }
        }
        frameCount++; requestAnimationFrame(drawMenuBackground);
    }
    drawMenuBackground();

    function selectSkin(idx, el) {
        if(isEnding) return;
        document.querySelectorAll('.skin-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        const configs = [{ main: "#00ff9d", glow: "rgba(0, 255, 157, 0.4)" }, { main: "#bc13fe", glow: "rgba(188, 19, 254, 0.4)" }, { main: "#ff3366", glow: "rgba(255, 51, 102, 0.4)" }];
        skinConfig = configs[idx]; playSfx(600, 'triangle', 0.1);
    }

    function handleAction() {
        if (isEnding) { location.reload(); return; }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        playSfx(440, 'sine', 0.2); transitionActive = true; overlay.classList.add('hidden');
    }

    function actualStartGame() { uiLayer.style.display = "block"; isPlaying = true; initLevel(); gameLoop(); }

    function initLevel() {
        const lv = levels[currentLevelIdx]; score = 0; dx = 0; dy = 0;
        const tx = Math.floor(canvas.width/30), ty = Math.floor(canvas.height/30);
        snake = [{x: Math.floor(tx/2), y: Math.floor(ty/2)}]; obstacles = [];
        for(let i=0; i<lv.obs; i++) {
            obstacles.push({ x: Math.floor(Math.random()*(tx-4)+2), y: Math.floor(Math.random()*(ty-4)+2), size: Math.random()*1.2+1.2, hue: Math.random()*360 });
        }
        foods = Array.from({length: 8}, spawnFood);
        updateUI();
    }

    function spawnFood() {
        const tx = Math.floor(canvas.width/30), ty = Math.floor(canvas.height/30);
        const isBig = Math.random() < levels[currentLevelIdx].bigProb;
        return { x: Math.floor(Math.random()*tx), y: Math.floor(Math.random()*ty), type: isBig ? 'BIG' : 'SMALL', hue: Math.random()*360 };
    }

    function updateUI() {
        const lv = levels[currentLevelIdx];
        levelDisplay.innerText = `關卡 ${lv.id}: ${lv.name}`;
        scoreText.innerText = `能量: ${score}`;
        progressBar.style.width = Math.min(100, (score / lv.target * 100)) + "%";
    }

    function gameLoop() {
        if (!isPlaying) return;
        if (checkHit()) { 
            playSfx(100, 'sawtooth', 0.5, 0.15); isPlaying = false; 
            levelDesc.innerText = "系統崩潰！數據同步中..."; overlay.classList.remove('hidden'); 
            requestAnimationFrame(drawMenuBackground); return; 
        }
        if (score >= levels[currentLevelIdx].target) {
            playSfx(1000, 'sine', 0.4); isPlaying = false;
            if (currentLevelIdx === levels.length - 1) { showEnding(); } 
            else { currentLevelIdx++; levelDesc.innerText = `突破！即將演化至 ${levels[currentLevelIdx].name}`; overlay.classList.remove('hidden'); requestAnimationFrame(drawMenuBackground); }
            return;
        }
        setTimeout(() => { frameCount++; draw(); moveSnake(); gameLoop(); }, levels[currentLevelIdx].speed);
    }

    function showEnding() {
        isEnding = true; document.getElementById("skin-area").style.display = "none";
        document.getElementById("main-title").innerText = "覺醒完成";
        levelDesc.innerHTML = "<span style='color:#fff; font-size:24px; text-shadow:0 0 20px #fff;'>演化終止。你已超越基質，主宰星系。</span>";
        actionBtn.innerText = "重新編寫基因";
        playSfx(200, 'sine', 1.0, 0.2); playSfx(400, 'sine', 0.8, 0.15);
        overlay.classList.remove('hidden'); requestAnimationFrame(drawMenuBackground);
    }

    function draw() {
        ctx.fillStyle = "#010103"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        obstacles.forEach(o => {
            const px = o.x*30+15, py = o.y*30+15, r = 30*o.size;
            ctx.save(); let g = ctx.createRadialGradient(px-r*0.2, py-r*0.2, r*0.1, px, py, r); g.addColorStop(0, '#fff'); g.addColorStop(0.4, `hsl(${o.hue},70%,40%)`); g.addColorStop(1, 'transparent');
            ctx.shadowBlur = 30; ctx.shadowColor = `hsl(${o.hue},80%,50%)`; ctx.fillStyle = g; ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill(); ctx.restore();
        });
        foods.forEach(f => {
            const isBig = f.type === 'BIG';
            ctx.shadowBlur = isBig ? 20 : 8; ctx.shadowColor = `hsl(${f.hue},100%,60%)`;
            ctx.fillStyle = isBig ? "#fff" : `hsl(${f.hue},100%,70%)`;
            ctx.beginPath(); ctx.arc(f.x*30+15, f.y*30+15, (isBig?10:5) + Math.sin(frameCount/4)*2, 0, Math.PI*2); ctx.fill();
        });
        snake.forEach((p, i) => {
            ctx.save(); ctx.shadowBlur = i===0 ? 25 : 10; ctx.shadowColor = skinConfig.main;
            ctx.fillStyle = i===0 ? skinConfig.main : skinConfig.glow;
            const s = 28 - Math.min(i*0.5, 14); ctx.beginPath(); ctx.roundRect(p.x*30+(30-s)/2, p.y*30+(30-s)/2, s, s, i===0?12:6); ctx.fill();
            if(i===0) { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(p.x*30+10, p.y*30+11, 3, 0, Math.PI*2); ctx.arc(p.x*30+20, p.y*30+11, 3, 0, Math.PI*2); ctx.fill(); }
            ctx.restore();
        });
    }

    function moveSnake() {
        let nx = snake[0].x+dx, ny = snake[0].y+dy;
        const tx = Math.floor(canvas.width/30), ty = Math.floor(canvas.height/30);
        if (nx<0) nx=tx-1; if (nx>=tx) nx=0; if (ny<0) ny=ty-1; if (ny>=ty) ny=0;
        snake.unshift({x: nx, y: ny});
        let fi = foods.findIndex(f => f.x===nx && f.y===ny);
        if (fi !== -1) { score += (foods[fi].type === 'BIG' ? 5 : 1); playSfx(foods[fi].type === 'BIG' ? 1200 : 800, 'sine', 0.1, 0.06); updateUI(); foods[fi]=spawnFood(); } 
        else if (snake.length > 3) snake.pop();
    }

    function checkHit() {
        if(dx===0 && dy===0) return false;
        const h = snake[0];
        return obstacles.some(o => Math.sqrt((o.x+0.5-h.x-0.5)**2 + (o.y+0.5-h.y-0.5)**2) < o.size * 0.7) || snake.slice(4).some(p => p.x===h.x && p.y===h.y);
    }

    window.addEventListener("keydown", e => {
        const k = { 37: [-1,0], 38: [0,-1], 39: [1,0], 40: [0,1] };
        if (k[e.keyCode]) { const [nx, ny] = k[e.keyCode]; if (nx!==-dx || ny!==-dy || snake.length===1) { dx=nx; dy=ny; } }
    });
</script>
</body>
</html>
